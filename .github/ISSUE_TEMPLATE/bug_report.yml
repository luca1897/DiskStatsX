name: Bug report
description: Report a reproducible DiskStatsX problem
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened and what did you expect?
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
    validations:
      required: true
  - type: input
    id: hardware
    attributes:
      label: Mac model and architecture
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Remove personal paths and filenames before posting.
